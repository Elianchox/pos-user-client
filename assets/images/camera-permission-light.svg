<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <g transform="translate(-50 -50)">
    <!-- Phone body -->
    <rect x="250" y="80" width="300" height="520" rx="40" fill="#fff" stroke="#3f3d56" stroke-width="3"/>
    <!-- Phone inner screen -->
    <rect x="270" y="110" width="260" height="460" rx="25" fill="#3f3d56"/>
    <!-- Camera notch / island -->
    <rect x="350" y="120" width="100" height="25" rx="12" fill="#090814"/>
    <!-- Camera lens -->
    <circle cx="385" cy="132" r="6" fill="#ed9da0"/>
    <circle cx="385" cy="132" r="3" fill="#fff"/>
    <!-- Flash flare -->
    <circle cx="420" cy="132" r="4" fill="#e5e5e5"/>
    <line x1="420" y1="120" x2="420" y2="115" stroke="#e5e5e5" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="420" y1="144" x2="420" y2="149" stroke="#e5e5e5" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="408" y1="132" x2="403" y2="132" stroke="#e5e5e5" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="432" y1="132" x2="437" y2="132" stroke="#e5e5e5" stroke-width="1.5" stroke-linecap="round"/>
    <!-- QR code area background -->
    <rect x="305" y="220" width="190" height="190" rx="8" fill="#fff"/>
    <!-- QR code pattern -->
    <rect x="315" y="230" width="50" height="50" rx="4" fill="#3f3d56"/>
    <rect x="325" y="240" width="30" height="30" rx="2" fill="#fff"/>
    <rect x="330" y="245" width="20" height="20" rx="1" fill="#3f3d56"/>
    <rect x="435" y="230" width="50" height="50" rx="4" fill="#3f3d56"/>
    <rect x="445" y="240" width="30" height="30" rx="2" fill="#fff"/>
    <rect x="450" y="245" width="20" height="20" rx="1" fill="#3f3d56"/>
    <rect x="315" y="350" width="50" height="50" rx="4" fill="#3f3d56"/>
    <rect x="325" y="360" width="30" height="30" rx="2" fill="#fff"/>
    <rect x="330" y="365" width="20" height="20" rx="1" fill="#3f3d56"/>
    <!-- QR inner dots -->
    <rect x="375" y="270" width="15" height="15" rx="2" fill="#3f3d56"/>
    <rect x="400" y="270" width="15" height="15" rx="2" fill="#3f3d56"/>
    <rect x="375" y="295" width="15" height="15" rx="2" fill="#3f3d56"/>
    <rect x="400" y="295" width="15" height="15" rx="2" fill="#3f3d56"/>
    <rect x="375" y="320" width="15" height="15" rx="2" fill="#3f3d56"/>
    <rect x="400" y="320" width="15" height="15" rx="2" fill="#3f3d56"/>
    <rect x="350" y="345" width="15" height="15" rx="2" fill="#3f3d56"/>
    <rect x="420" y="300" width="10" height="10" rx="1" fill="#3f3d56"/>
    <rect x="350" y="270" width="10" height="10" rx="1" fill="#3f3d56"/>
    <!-- Scan line -->
    <line x1="305" y1="315" x2="495" y2="315" stroke="#ed9da0" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
    <!-- Focus brackets -->
    <path d="M290,205 L290,185 L310,185" fill="none" stroke="#3f3d56" stroke-width="3" stroke-linecap="round"/>
    <path d="M510,205 L510,185 L490,185" fill="none" stroke="#3f3d56" stroke-width="3" stroke-linecap="round"/>
    <path d="M290,425 L290,445 L310,445" fill="none" stroke="#3f3d56" stroke-width="3" stroke-linecap="round"/>
    <path d="M510,425 L510,445 L490,445" fill="none" stroke="#3f3d56" stroke-width="3" stroke-linecap="round"/>
    <!-- Home indicator -->
    <rect x="365" y="550" width="70" height="4" rx="2" fill="#e5e5e5"/>
    <!-- Decorative circles -->
    <circle cx="160" cy="180" r="12" fill="#e5e5e5" opacity="0.6"/>
    <circle cx="640" cy="480" r="18" fill="#ed9da0" opacity="0.4"/>
    <circle cx="660" cy="150" r="8" fill="#3f3d56" opacity="0.2"/>
    <circle cx="140" cy="440" r="6" fill="#ed9da0" opacity="0.3"/>
  </g>
</svg>